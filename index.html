<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RecoM3ndo Traveler Assistant</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>RecoM3ndo Traveler Assistant</h1>
      <p>
        Discover trusted recommendations for dining, hotels, entertainment,
        contractors, government assistance, and employment programs.
      </p>
    </header>

    <main>
      <section class="search-panel">
        <h2>Plan Your Needs</h2>
        <form id="recommendation-form">
          <div class="grid">
            <label>
              Destination
              <select id="destination" required>
                <option value="">Choose a city</option>
                <option>Houston</option>
                <option>Austin</option>
                <option>Dallas</option>
                <option>San Antonio</option>
              </select>
            </label>

            <label>
              Need Type
              <select id="category">
                <option value="all">All</option>
                <option value="dining">Dining</option>
                <option value="hotels">Hotels</option>
                <option value="entertainment">Entertainment</option>
                <option value="contractors">Contractors</option>
                <option value="government_assistance">Government Assistance</option>
                <option value="employment_programs">Employment Programs</option>
              </select>
            </label>

            <label>
              Budget Level
              <select id="budget">
                <option value="any">Any</option>
                <option value="low">Low</option>
                <option value="mid">Mid</option>
                <option value="high">High</option>
              </select>
            </label>

            <label>
              Travel Style
              <select id="style">
                <option value="any">Any</option>
                <option value="family">Family Friendly</option>
                <option value="solo">Solo</option>
                <option value="business">Business</option>
                <option value="budget">Budget Saver</option>
              </select>
            </label>

            <label>
              Keyword Search
              <input
                id="keyword"
                type="text"
                placeholder="e.g., jobs, kid menu, shuttle"
              />
            </label>

            <label>
              Max Results
              <select id="max-results">
                <option value="3">Top 3</option>
                <option value="6" selected>Top 6</option>
                <option value="9">Top 9</option>
              </select>
            </label>
          </div>

          <div class="controls">
            <label class="checkbox-row">
              <input id="verified-only" type="checkbox" />
              Show only verified programs/providers
            </label>

            <div class="actions">
              <button type="submit">Get Recommendations</button>
              <button type="button" id="reset-btn" class="secondary">Reset</button>
            </div>
          </div>
        </form>
      </section>

      <section>
        <div class="section-header">
          <h2>Recommended Results</h2>
          <p id="result-summary" aria-live="polite"></p>
        </div>
        <div id="results" class="cards" aria-live="polite"></div>
      </section>
    </main>

    <template id="card-template">
      <article class="card">
        <div class="card-top">
          <h3 class="name"></h3>
          <span class="score"></span>
        </div>
        <p class="meta"></p>
        <p class="description"></p>
        <ul class="tags"></ul>
      </article>
    </template>

    <script src="recommender.js"></script>
    <script src="app.js"></script>
  </body>
</html>
